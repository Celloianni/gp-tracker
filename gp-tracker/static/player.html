<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP Tracker — Player</title>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
  .back-link { color: #a78bfa; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .back-link:hover { color: #c4b5fd; }
  .header-title { font-size: 20px; font-weight: 600; color: #e2e8f0; }
  .header-gp { font-size: 14px; color: #64748b; margin-left: auto; }
  .container { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
  .section { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
  .section-title { font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
  .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .date-nav select { background: #141625; border: 1px solid #2d3148; border-radius: 8px; padding: 7px 12px; color: #e2e8f0; font-size: 13px; outline: none; cursor: pointer; }
  .date-nav select:focus { border-color: #7c3aed; }
  .btn-nav { background: #141625; border: 1px solid #2d3148; border-radius: 8px; padding: 6px 12px; color: #94a3b8; cursor: pointer; font-size: 16px; transition: all 0.2s; }
  .btn-nav:hover:not(:disabled) { border-color: #7c3aed; color: #a78bfa; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .changes-list { display: flex; flex-direction: column; gap: 8px; }
  .change-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #141625; border-radius: 8px; border: 1px solid #1e2235; }
  .change-icon { font-size: 18px; width: 40px; height: 40px; text-align: center; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
  .change-icon img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: #333; }
  .change-name { font-weight: 500; color: #e2e8f0; flex: 1; min-width: 0; }
  .change-name small { display: block; font-size: 11px; color: #64748b; font-weight: 400; }
  .change-detail { font-size: 13px; color: #94a3b8; white-space: nowrap; }
  .change-detail .arrow { color: #34d399; margin: 0 4px; }
  .change-detail .new-badge { background: #065f46; color: #34d399; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  .empty-changes { text-align: center; padding: 40px; color: #64748b; }
  .chart-wrap { }
  .loading { text-align: center; padding: 60px; color: #64748b; }
  .stars { color: #fbbf24; font-size: 12px; }
  .relic-badge { background: #1e1b4b; color: #a78bfa; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  .gear-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
  .gear-g1  { background: #1f2937; color: #9ca3af; }
  .gear-g24 { background: #052e16; color: #86efac; }
  .gear-g57 { background: #0c1a3a; color: #93c5fd; }
  .gear-g811{ background: #2e1065; color: #c4b5fd; }
  .gear-g12 { background: #422006; color: #fcd34d; }
  .gear-g13 { background: #422006; color: #fcd34d; }
  .type-badge { font-size: 11px; color: #64748b; }
  .unit-names-warn { background: #1c1410; border: 1px solid #92400e; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fbbf24; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .btn-sync { background: #7c3aed; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .btn-sync:hover { background: #6d28d9; }
  .btn-sync:disabled { background: #3d2d6e; cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border: 2px solid #3d2d6e; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  /* Unit cards for "Upgraded Yesterday" */
  .unit-cards-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .unit-card { background: #141625; border: 1px solid #2d3148; border-radius: 10px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; width: 110px; text-align: center; }
  .unit-card img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #333; }
  .unit-card-icon { width: 56px; height: 56px; border-radius: 8px; background: #1e2235; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .unit-card-name { font-size: 11px; color: #e2e8f0; font-weight: 500; line-height: 1.3; }
  .unit-card-change { font-size: 11px; color: #34d399; }
  /* Calendar */
  .cal-month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .cal-month-nav select { background: #141625; border: 1px solid #2d3148; border-radius: 8px; padding: 5px 10px; color: #e2e8f0; font-size: 13px; outline: none; cursor: pointer; }
  .cal-dow-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .cal-dow { text-align: center; font-size: 11px; color: #475569; padding: 4px 0; }
  .cal-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .cal-cell { min-height: 70px; border-radius: 8px; padding: 8px 6px; border: 1px solid transparent; }
  .cal-cell.empty { background: transparent; border-color: transparent; }
  .cal-cell.no-data { background: #141625; border-color: #1e2235; }
  .cal-cell.has-changes { background: rgba(52, 211, 153, 0.07); border-color: rgba(52, 211, 153, 0.25); }
  .cal-cell.no-changes { background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.2); }
  .cal-date { font-size: 16px; font-weight: 600; color: #94a3b8; }
  .cal-cell.has-changes .cal-date { color: #34d399; }
  .cal-cell.no-changes .cal-date { color: #ef4444; opacity: 0.7; }
  .cal-today .cal-date { background: #7c3aed; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .cal-changes-text { font-size: 10px; color: #64748b; margin-top: 5px; line-height: 1.5; }
  .cal-cell.has-changes .cal-changes-text { color: #94a3b8; }
</style>
</head>
<body x-data="playerApp()" x-init="init()">

<div class="header">
  <a href="/" class="back-link">← Friends</a>
  <div class="header-title" x-text="playerName || 'Loading...'"></div>
  <div class="header-gp" x-show="currentGp" x-text="currentGp ? currentGp.toLocaleString() + ' GP' : ''"></div>
</div>

<div class="container">

  <!-- Unit names warning -->
  <div class="unit-names-warn" x-show="!syncingNames">
    <span x-text="unitNamesCount === 0 ? '⚠️ Unit names not loaded yet — unit IDs will be shown instead of names.' : '✅ Unit names loaded (' + unitNamesCount + '). Click to reload if names look wrong.'"></span>
    <button class="btn-sync" @click="syncUnitNames()" :disabled="syncingNames" x-text="unitNamesCount === 0 ? 'Load Unit Names' : 'Reload'"></button>
  </div>
  <div class="unit-names-warn" x-show="syncingNames" style="justify-content: center;">
    <span class="spinner"></span>
    <span style="margin-left:8px">Syncing unit names from comlink...</span>
  </div>

  <!-- Upgraded Yesterday -->
  <div class="section">
    <div class="section-title">Upgraded Yesterday</div>
    <div x-show="loadingYesterday" class="loading" style="padding:30px">
      <div style="display:inline-flex;align-items:center;gap:8px"><div class="spinner"></div> Loading...</div>
    </div>
    <div x-show="!loadingYesterday && yesterdayChanges.length === 0" class="empty-changes" style="padding:20px">
      No upgrades yesterday
    </div>
    <div class="unit-cards-grid" x-show="!loadingYesterday && yesterdayChanges.length > 0">
      <template x-for="change in yesterdayChanges" :key="change.unit_id">
        <div class="unit-card">
          <template x-if="change.thumbnail_url">
            <img :src="change.thumbnail_url" :alt="change.name" @error="$el.style.display='none'">
          </template>
          <template x-if="!change.thumbnail_url">
            <div class="unit-card-icon" x-text="change.combat_type === 2 ? '🚀' : '⚔️'"></div>
          </template>
          <div class="unit-card-name" x-text="change.name"></div>
          <div class="unit-card-change" x-text="formatCardChange(change)"></div>
        </div>
      </template>
    </div>
  </div>

  <!-- Calendar -->
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin-bottom:0" x-text="calMonthLabel"></div>
      <select x-model="calMonth" @change="loadMonthData()" style="background:#141625;border:1px solid #2d3148;border-radius:8px;padding:5px 10px;color:#e2e8f0;font-size:12px;outline:none;cursor:pointer">
        <template x-for="m in availableCalMonths" :key="m.value">
          <option :value="m.value" x-text="m.label"></option>
        </template>
      </select>
    </div>
    <div x-show="loadingMonth" class="loading" style="padding:30px">
      <div style="display:inline-flex;align-items:center;gap:8px"><div class="spinner"></div> Loading...</div>
    </div>
    <div x-show="!loadingMonth">
      <div class="cal-dow-header">
        <template x-for="d in ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']">
          <div class="cal-dow" x-text="d"></div>
        </template>
      </div>
      <template x-for="(week, wi) in calendarWeeks" :key="wi">
        <div class="cal-week">
          <template x-for="(cell, ci) in week" :key="ci">
            <div :class="calCellClass(cell)">
              <template x-if="cell">
                <div>
                  <div :class="isToday(cell.date) ? 'cal-today' : ''">
                    <div class="cal-date" x-text="cell.day"></div>
                  </div>
                  <div class="cal-changes-text" x-html="calCellText(cell)"></div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- Roster Changes (debug, hidden) -->
  <div class="section" style="display:none">
    <div class="section-title">Roster Changes</div>

    <div class="date-nav">
      <button class="btn-nav" @click="prevDate()" :disabled="dateIndex >= availableDates.length - 1">‹</button>
      <select x-model="selectedDate" @change="loadChanges()">
        <template x-for="d in availableDates" :key="d">
          <option :value="d" x-text="formatDate(d)"></option>
        </template>
      </select>
      <button class="btn-nav" @click="nextDate()" :disabled="dateIndex <= 0">›</button>
      <span x-show="changesData.prev_date" style="font-size:12px;color:#64748b" x-text="changesData.prev_date ? 'vs ' + formatDate(changesData.prev_date) : ''"></span>
    </div>

    <div x-show="loadingChanges" class="loading">
      <div style="display:inline-flex;align-items:center;gap:8px"><div class="spinner"></div> Loading...</div>
    </div>

    <div x-show="!loadingChanges && changesData.changes && changesData.changes.length === 0" class="empty-changes">
      No changes found for this day
    </div>

    <div x-show="!loadingChanges && !changesData.prev_date && availableDates.length > 0" class="empty-changes">
      No previous snapshot to compare with
    </div>

    <div class="changes-list" x-show="!loadingChanges && changesData.changes && changesData.changes.length > 0">
      <template x-for="change in changesData.changes" :key="change.unit_id">
        <div class="change-row">
          <!-- New unit -->
          <template x-if="change.type === 'new'">
            <div style="display:contents">
              <div class="change-icon">
                <template x-if="change.thumbnail_url">
                  <img :src="change.thumbnail_url" :alt="change.name" @error="$el.style.display='none'">
                </template>
                <template x-if="!change.thumbnail_url">
                  <span x-text="change.combat_type === 2 ? '🚀' : '🆕'"></span>
                </template>
              </div>
              <div class="change-name">
                <span x-text="change.name"></span>
                <small x-text="change.combat_type === 2 ? 'Ship' : 'Character'" style="text-transform:capitalize"></small>
              </div>
              <div class="change-detail">
                <span class="new-badge">NEW</span>
                <span class="stars" x-text="(change.stars || 1) + '⭐'"></span>
                <template x-if="change.combat_type !== 2">
                  <span x-show="change.relic_tier >= 3" class="relic-badge" x-text="'R' + (change.relic_tier - 2)"></span>
                </template>
                <template x-if="change.combat_type !== 2 && change.relic_tier < 3">
                  <span :class="gearClass(change.gear_tier)" x-text="'G' + change.gear_tier"></span>
                </template>
              </div>
            </div>
          </template>
          <!-- Upgrade -->
          <template x-if="change.type === 'upgrade'">
            <div style="display:contents">
              <div class="change-icon">
                <template x-if="change.thumbnail_url">
                  <img :src="change.thumbnail_url" :alt="change.name" @error="$el.style.display='none'">
                </template>
                <template x-if="!change.thumbnail_url">
                  <span x-text="getUpgradeIcon(change)"></span>
                </template>
              </div>
              <div class="change-name">
                <span x-text="change.name"></span>
                <small x-text="change.combat_type === 2 ? 'Ship' : 'Character'" style="text-transform:capitalize"></small>
              </div>
              <div class="change-detail" style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
                <template x-for="c in change.changes" :key="c.field">
                  <div>
                    <span x-text="formatChangeLabel(c)"></span>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- GP History Chart -->
  <div class="section" x-show="historyLoaded">
    <div class="section-title">GP History</div>
    <div class="chart-wrap">
      <canvas id="gpChart" height="200"></canvas>
    </div>
  </div>

</div>

<script>
function playerApp() {
  return {
    playerId: null,
    playerName: '',
    currentGp: 0,
    availableDates: [],
    selectedDate: null,
    dateIndex: 0,
    changesData: { date: null, prev_date: null, changes: [] },
    loadingChanges: false,
    historyLoaded: false,
    unitNamesCount: null,
    syncingNames: false,
    gpChart: null,
    yesterdayChanges: [],
    loadingYesterday: false,
    calMonth: '',
    availableCalMonths: [],
    monthData: {},
    loadingMonth: false,

    async init() {
      const params = new URLSearchParams(window.location.search);
      this.playerId = params.get('id');
      const name = params.get('name');
      if (name) this.playerName = decodeURIComponent(name);

      if (!this.playerId) {
        window.location.href = '/';
        return;
      }

      // Check unit names
      const statusR = await fetch('/api/admin/unit_names_status');
      if (statusR.ok) {
        const s = await statusR.json();
        this.unitNamesCount = s.count;
      }

      // Load available dates
      const datesR = await fetch(`/api/friends/roster_dates/${this.playerId}`);
      if (datesR.status === 401) { window.location.href = '/login'; return; }
      if (datesR.ok) {
        this.availableDates = await datesR.json();
        if (this.availableDates.length > 0) {
          this.selectedDate = this.availableDates[0];
          this.dateIndex = 0;
          await this.loadChanges();
        }
      }

      // Load GP history for chart
      await this.loadHistory();

      await this.loadYesterday();
      this.initCalendar();
      await this.loadMonthData();
    },

    async loadChanges() {
      if (!this.selectedDate) return;
      this.loadingChanges = true;
      this.dateIndex = this.availableDates.indexOf(this.selectedDate);
      try {
        const r = await fetch(`/api/friends/roster_changes/${this.playerId}?date=${this.selectedDate}`);
        if (r.status === 401) { window.location.href = '/login'; return; }
        this.changesData = await r.json();
      } catch(e) { console.error(e); }
      finally { this.loadingChanges = false; }
    },

    prevDate() {
      if (this.dateIndex < this.availableDates.length - 1) {
        this.dateIndex++;
        this.selectedDate = this.availableDates[this.dateIndex];
        this.loadChanges();
      }
    },

    nextDate() {
      if (this.dateIndex > 0) {
        this.dateIndex--;
        this.selectedDate = this.availableDates[this.dateIndex];
        this.loadChanges();
      }
    },

    async loadHistory() {
      try {
        const r = await fetch('/api/friends/history');
        if (!r.ok) return;
        const allPlayers = await r.json();
        const player = allPlayers.find(p => p.history && p.history.length > 0 && p.name === this.playerName);
        if (!player) return;

        const labels = player.history.map(h => h.date);
        const data = player.history.map(h => h.gp);

        this.currentGp = data[data.length - 1] || 0;
        this.historyLoaded = true;

        await this.$nextTick();
        const ctx = document.getElementById('gpChart');
        if (!ctx) return;
        if (this.gpChart) this.gpChart.destroy();
        this.gpChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: this.playerName,
              data,
              borderColor: '#7c3aed',
              backgroundColor: 'rgba(124,58,237,0.1)',
              borderWidth: 2,
              fill: true,
              tension: 0.3,
              pointRadius: 3,
              pointHoverRadius: 5,
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => ctx.parsed.y.toLocaleString() + ' GP'
                }
              }
            },
            scales: {
              x: {
                ticks: { color: '#64748b', font: { size: 11 }, maxTicksLimit: 8 },
                grid: { color: '#1e2235' }
              },
              y: {
                ticks: {
                  color: '#64748b',
                  font: { size: 11 },
                  callback: v => (v / 1000000).toFixed(1) + 'M'
                },
                grid: { color: '#1e2235' }
              }
            }
          }
        });
      } catch(e) { console.error(e); }
    },

    async syncUnitNames() {
      this.syncingNames = true;
      try {
        const r = await fetch('/api/admin/sync_unit_names', { method: 'POST' });
        if (r.ok) {
          const data = await r.json();
          this.unitNamesCount = data.count;
          // Reload changes to show proper names
          if (this.selectedDate) await this.loadChanges();
        }
      } catch(e) { console.error(e); }
      finally { this.syncingNames = false; }
    },

    gearClass(g) {
      if (g >= 13) return 'gear-badge gear-g13';
      if (g >= 12) return 'gear-badge gear-g12';
      if (g >= 8)  return 'gear-badge gear-g811';
      if (g >= 5)  return 'gear-badge gear-g57';
      if (g >= 2)  return 'gear-badge gear-g24';
      return 'gear-badge gear-g1';
    },

    formatDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-');
      return `${day}.${m}.${y}`;
    },

    getUpgradeIcon(change) {
      const fields = change.changes.map(c => c.field);
      if (fields.includes('relic_tier')) return '🔧';
      if (fields.includes('gear_tier')) return '⚙️';
      if (fields.includes('stars')) return '⭐';
      if (fields.includes('level')) return '📈';
      if (fields.some(f => f.startsWith('ability'))) return '💡';
      return '✨';
    },

    formatChangeLabel(c) {
      if (c.field === 'stars') return `${c.from}⭐ → ${c.to}⭐`;
      if (c.field === 'level') return `Lvl ${c.from} → ${c.to}`;
      if (c.field === 'gear_tier') return `G${c.from} → G${c.to}`;
      if (c.field === 'relic_tier') {
        const fromR = c.from <= 2 ? 'G13' : `R${c.from - 2}`;
        const toR = `R${c.to - 2}`;
        return `${fromR} → ${toR}`;
      }
      if (c.field === 'ability') {
        const zeta = c.is_zeta ? ' Ω' : '';
        return `${c.ability_name}${zeta}: Tier ${c.from} → ${c.to}`;
      }
      if (c.field === 'ability_new') {
        const zeta = c.is_zeta ? ' Ω' : '';
        return `${c.ability_name}${zeta}: new (Tier ${c.tier})`;
      }
      return `${c.field}: ${c.from} → ${c.to}`;
    },

    async loadYesterday() {
      this.loadingYesterday = true;
      try {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toISOString().slice(0, 10);
        const r = await fetch(`/api/friends/roster_changes/${this.playerId}?date=${yStr}`);
        if (r.status === 401) { window.location.href = '/login'; return; }
        const data = await r.json();
        this.yesterdayChanges = (data.changes || []).filter(c => c.type === 'upgrade');
      } catch(e) { console.error(e); }
      finally { this.loadingYesterday = false; }
    },

    initCalendar() {
      const today = new Date();
      const months = [];
      for (let i = 0; i < 12; i++) {
        const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        months.push({ value: val, label });
      }
      this.availableCalMonths = months;
      this.calMonth = months[0].value;
    },

    async loadMonthData() {
      this.loadingMonth = true;
      try {
        const r = await fetch(`/api/friends/roster_month/${this.playerId}?month=${this.calMonth}`);
        if (r.status === 401) { window.location.href = '/login'; return; }
        this.monthData = await r.json();
      } catch(e) { console.error(e); }
      finally { this.loadingMonth = false; }
    },

    get calMonthLabel() {
      if (!this.calMonth) return '';
      const [y, m] = this.calMonth.split('-').map(Number);
      return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
    },

    get calendarWeeks() {
      if (!this.calMonth) return [];
      const [year, month] = this.calMonth.split('-').map(Number);
      const firstDay = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0);
      let startDow = firstDay.getDay();
      if (startDow === 0) startDow = 7;
      startDow -= 1;
      const weeks = [];
      let week = [];
      for (let i = 0; i < startDow; i++) week.push(null);
      for (let d = 1; d <= lastDay.getDate(); d++) {
        const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayData = this.monthData[dateStr];
        week.push({ day: d, date: dateStr, hasSnapshot: !!(dayData), hasPrev: !!(dayData?.has_prev), changes: dayData?.changes || [] });
        if (week.length === 7) { weeks.push(week); week = []; }
      }
      while (week.length > 0 && week.length < 7) week.push(null);
      if (week.length > 0) weeks.push(week);
      return weeks;
    },

    calCellClass(cell) {
      if (!cell) return 'cal-cell empty';
      if (!cell.hasSnapshot || !cell.hasPrev) return 'cal-cell no-data';
      if (cell.changes.length > 0) return 'cal-cell has-changes';
      return 'cal-cell no-changes';
    },

    isToday(dateStr) {
      return dateStr === new Date().toISOString().slice(0, 10);
    },

    calCellText(cell) {
      if (!cell || !cell.hasPrev || cell.changes.length === 0) return '';
      return cell.changes.slice(0, 4).map(c => {
        const mainChange = c.changes && c.changes[0];
        if (!mainChange) return `<span>${c.name}</span>`;
        const label = this.formatChangeLabel(mainChange);
        return `<span>${c.name} <b style="color:#34d399">${label}</b></span>`;
      }).join('<br>') + (cell.changes.length > 4 ? `<br><span style="color:#64748b">+${cell.changes.length - 4} more</span>` : '');
    },

    formatCardChange(change) {
      if (change.type === 'new') return 'NEW';
      if (!change.changes || change.changes.length === 0) return '';
      return change.changes.map(c => this.formatChangeLabel(c)).join(', ');
    },
  }
}
