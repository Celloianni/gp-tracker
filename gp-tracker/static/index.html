<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP Tracker — Guild Progress</title>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  .header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; color: #a78bfa; }
  .tabs { display: flex; gap: 4px; padding: 0 32px; background: #1a1d2e; border-bottom: 1px solid #2d3148; overflow-x: auto; }
  .tab { padding: 12px 18px; font-size: 13px; font-weight: 500; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.2s; }
  .tab:hover { color: #a78bfa; }
  .tab.active { color: #a78bfa; border-bottom-color: #7c3aed; }
  .container { max-width: 960px; margin: 0 auto; padding: 28px 20px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 18px 20px; }
  .stat-card .label { font-size: 12px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 24px; font-weight: 700; color: #e2e8f0; }
  .btn { background: #7c3aed; color: white; border: none; padding: 8px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #6d28d9; }
  .btn:disabled { background: #3d2d6e; color: #9ca3af; cursor: not-allowed; }
  .btn-sm { background: transparent; border: 1px solid #2d3148; color: #94a3b8; padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .btn-sm:hover { border-color: #7c3aed; color: #a78bfa; }
  .table-wrap { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: #141625; }
  th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; }
  th:hover { color: #a78bfa; }
  td { padding: 13px 16px; font-size: 14px; border-top: 1px solid #1e2235; }
  tr:hover td { background: #1e2235; }
  .rank { color: #64748b; font-size: 13px; width: 36px; }
  .rank.top1 { color: #fbbf24; font-weight: 700; }
  .rank.top2 { color: #94a3b8; font-weight: 700; }
  .rank.top3 { color: #b45309; font-weight: 700; }
  .name { font-weight: 500; color: #e2e8f0; }
  .gp { font-variant-numeric: tabular-nums; color: #cbd5e1; }
  .diff { font-weight: 600; font-variant-numeric: tabular-nums; }
  .diff.pos { color: #34d399; }
  .diff.neg { color: #f87171; }
  .diff.zero { color: #64748b; }
  .pct { font-size: 12px; color: #64748b; }
  .pct.pos { color: #6ee7b7; }
  .loading { text-align: center; padding: 60px; color: #64748b; }
  .empty { text-align: center; padding: 60px; color: #64748b; }
  .collecting { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: #a78bfa; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border: 2px solid #3d2d6e; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .search { background: #141625; border: 1px solid #2d3148; border-radius: 8px; padding: 8px 14px; color: #e2e8f0; font-size: 14px; width: 220px; outline: none; margin-right: 12px; }
  .search:focus { border-color: #7c3aed; }
  .toolbar { display: flex; align-items: center; margin-bottom: 16px; }
  .dates { font-size: 13px; color: #64748b; margin-bottom: 20px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 16px; padding: 28px; width: 340px; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #e2e8f0; }
  .modal input { width: 100%; background: #141625; border: 1px solid #2d3148; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; margin-bottom: 12px; }
  .modal input:focus { border-color: #7c3aed; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .error-msg { font-size: 13px; color: #f87171; margin-bottom: 10px; }
</style>
</head>
<body x-data="tracker()" x-init="init()">

<div class="modal-bg" x-show="showModal" @keydown.escape.window="showModal=false">
  <div class="modal">
    <h2>Refresh data</h2>
    <input type="password" placeholder="Enter password" x-model="password" @keydown.enter="collect()" autofocus>
    <div class="error-msg" x-show="wrongPassword">Wrong password</div>
    <div class="modal-btns">
      <button class="btn-sm" @click="showModal=false; password=''; wrongPassword=false">Cancel</button>
      <button class="btn" @click="collect()" :disabled="collecting">
        <span x-show="!collecting">Refresh</span>
        <span class="collecting" x-show="collecting"><span class="spinner"></span> Collecting...</span>
      </button>
    </div>
  </div>
</div>

<div class="header">
  <h1>GP Tracker</h1>
  <button class="btn" @click="showModal=true; wrongPassword=false">Refresh data</button>
</div>

<div class="tabs">
  <template x-for="g in guilds" :key="g.id">
    <div class="tab" :class="activeGuild === g.id ? 'active' : ''" @click="switchGuild(g.id)" x-text="g.name"></div>
  </template>
</div>

<div class="container">
  <div class="stats-row" x-show="data.players && data.players.length">
    <div class="stat-card">
      <div class="label">Guild members</div>
      <div class="value" x-text="data.players ? data.players.length : 0"></div>
    </div>
    <div class="stat-card">
      <div class="label">Total GP</div>
      <div class="value" x-text="totalGP()"></div>
    </div>
    <div class="stat-card">
      <div class="label">GP growth</div>
      <div class="value" x-text="totalDiff()"></div>
    </div>
  </div>

  <div class="dates" x-show="data.latest_date">
    <span x-text="data.prev_date ? 'Period: ' + data.prev_date + ' → ' + data.latest_date : 'Snapshot: ' + data.latest_date"></span>
  </div>

  <div class="toolbar">
    <input class="search" type="text" placeholder="Search player..." x-model="search">
    <span style="font-size:13px;color:#64748b;" x-text="filtered().length + ' players'"></span>
  </div>

  <div class="table-wrap">
    <div class="loading" x-show="loading">Loading data...</div>
    <div class="empty" x-show="!loading && (!data.players || data.players.length === 0)">
      No data yet. Click "Refresh data" to collect the first snapshot.
    </div>
    <table x-show="!loading && data.players && data.players.length > 0">
      <thead>
        <tr>
          <th @click="sort('rank')">#</th>
          <th @click="sort('name')">Player</th>
          <th @click="sort('gp')">GP now</th>
          <th @click="sort('diff')">GP growth</th>
          <th @click="sort('diff_pct')">%</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(p, i) in filtered()" :key="p.name">
          <tr>
            <td class="rank" :class="i===0?'top1':i===1?'top2':i===2?'top3':''" x-text="i+1"></td>
            <td class="name" x-text="p.name"></td>
            <td class="gp" x-text="fmt(p.gp)"></td>
            <td class="diff" :class="p.diff>0?'pos':p.diff<0?'neg':'zero'" x-text="(p.diff>0?'+':'')+fmt(p.diff)"></td>
            <td class="pct" :class="p.diff_pct>0?'pos':''" x-text="(p.diff_pct>0?'+':'')+p.diff_pct+'%'"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>

<script>
function tracker() {
  return {
    guilds: [],
    activeGuild: null,
    data: {},
    loading: true,
    collecting: false,
    search: '',
    sortKey: 'diff',
    sortDir: -1,
    showModal: false,
    password: '',
    wrongPassword: false,

    async init() {
      const r = await fetch('/api/guilds');
      this.guilds = await r.json();
      if (this.guilds.length > 0) {
        this.activeGuild = this.guilds[0].id;
        await this.load();
      }
      setInterval(() => this.load(), 30000);
    },

    async switchGuild(id) {
      this.activeGuild = id;
      this.loading = true;
      this.search = '';
      this.sortKey = 'diff';
      this.sortDir = -1;
      await this.load();
    },

    async load() {
      if (!this.activeGuild) return;
      try {
        const r = await fetch(`/api/progress/${this.activeGuild}`);
        this.data = await r.json();
      } catch(e) {
        console.error(e);
      } finally {
        this.loading = false;
      }
    },

    async collect() {
      this.collecting = true;
      this.wrongPassword = false;
      try {
        const r = await fetch('/api/collect', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password: this.password})
        });
        if (r.status === 401) {
          this.wrongPassword = true;
          this.collecting = false;
          return;
        }
        this.showModal = false;
        this.password = '';
        await new Promise(r => setTimeout(r, 15000));
        await this.load();
      } catch(e) {
        console.error(e);
      } finally {
        this.collecting = false;
      }
    },

    filtered() {
      let players = this.data.players || [];
      if (this.search) {
        players = players.filter(p => p.name.toLowerCase().includes(this.search.toLowerCase()));
      }
      return [...players].sort((a, b) => {
        return this.sortDir * (a[this.sortKey] > b[this.sortKey] ? 1 : -1);
      });
    },

    sort(key) {
      if (this.sortKey === key) this.sortDir *= -1;
      else { this.sortKey = key; this.sortDir = -1; }
    },

    fmt(n) {
      return Number(n).toLocaleString('en-US');
    },

    totalGP() {
      const total = (this.data.players || []).reduce((s, p) => s + p.gp, 0);
      return this.fmt(total);
    },

    totalDiff() {
      const total = (this.data.players || []).reduce((s, p) => s + p.diff, 0);
      return (total > 0 ? '+' : '') + this.fmt(total);
    }
  }
}
</script>
</body>
</html>
