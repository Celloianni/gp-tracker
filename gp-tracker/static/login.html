<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP Tracker — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0c14;
    position: relative;
    overflow: hidden;
  }
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('/static/bg.jpg');
    background-size: cover;
    background-position: center top;
    filter: brightness(0.45);
    z-index: 0;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,12,20,0.2) 0%, rgba(10,12,20,0.7) 100%);
    z-index: 1;
  }
  .card {
    position: relative;
    z-index: 2;
    background: rgba(15, 17, 28, 0.85);
    border: 1px solid rgba(167, 139, 250, 0.25);
    border-radius: 20px;
    padding: 44px 40px;
    width: 360px;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 60px rgba(124, 58, 237, 0.15);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 26px;
    font-weight: 700;
    color: #a78bfa;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .logo p {
    font-size: 12px;
    color: #475569;
    margin-top: 6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .divider {
    height: 1px;
    background: rgba(167, 139, 250, 0.15);
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: rgba(20, 22, 37, 0.9);
    border: 1px solid rgba(167, 139, 250, 0.2);
    border-radius: 10px;
    padding: 12px 16px;
    color: #e2e8f0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
    letter-spacing: 0.1em;
  }
  input:focus {
    border-color: rgba(167, 139, 250, 0.6);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
  }
  button {
    width: 100%;
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #6d28d9; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #3d2d6e; color: #6b7280; cursor: not-allowed; }
  .error {
    font-size: 13px;
    color: #f87171;
    text-align: center;
    margin-top: 14px;
    min-height: 20px;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: #334155;
    letter-spacing: 0.05em;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 60px rgba(124, 58, 237, 0.15); }
    50% { box-shadow: 0 0 80px rgba(124, 58, 237, 0.25); }
  }
  .card { animation: pulse 4s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="card">
    <div class="logo">
      <h1>GP Tracker</h1>
      <p>Galactic Power Intelligence</p>
    </div>
    <div class="divider"></div>
    <label>Access Code</label>
    <input type="password" id="password" placeholder="••••••••" autofocus>
    <button id="btn" onclick="login()">Enter</button>
    <div class="error" id="error"></div>
    <div class="footer">OUTER RIM ALLIANCE · CLASSIFIED</div>
  </div>
  <script>
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn');
      const error = document.getElementById('error');
      if (!password) return;
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      error.textContent = '';
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password})
        });
        if (r.ok) {
          window.location.href = '/';
        } else {
          error.textContent = 'Access denied. Invalid code.';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch(e) {
        error.textContent = 'Connection error. Try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    }
  </script>
</body>
</html>
